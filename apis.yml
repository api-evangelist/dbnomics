aid: dbnomics
url: https://raw.githubusercontent.com/api-evangelist/dbnomics/refs/heads/main/apis.yml
name: DBnomics
kind: organization
description: DBnomics is the world's economic database - a free, open-source
  aggregator run by Cepremap that harvests macroeconomic time series from more
  than 90 national and international providers (IMF, ECB, Eurostat, World Bank,
  OECD, BLS, BEA, Banque de France, Federal Statistical Office Germany, and
  many more) into one standardized format. Hundreds of millions of series
  covering economic indicators, government statistics, prices, employment,
  trade, and finance are refreshed daily and served through a documented public
  REST API (api.db.nomics.world/v22) that requires no API key, plus official
  Python and R clients and community clients for Julia, Matlab, Stata, EViews,
  and Gretl.
